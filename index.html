<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Japanese Reading Stats - Books</title>
  <style>
    :root {
      --bg: #f6f4ef;
      --surface: #fffdf8;
      --surface-2: #f0ede6;
      --ink: #202326;
      --muted: #626a70;
      --line: #d8d1c4;
      --accent: #176b62;
      --shadow: 0 10px 28px rgba(31, 35, 38, 0.07);
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    main {
      width: min(720px, calc(100vw - 40px));
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      padding: 28px;
      box-shadow: var(--shadow);
    }
    h1 { margin: 0 0 10px; font-size: 2rem; }
    p { color: var(--muted); line-height: 1.5; }
    nav { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 22px; }
    a {
      color: var(--accent);
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 10px 16px;
      background: var(--surface-2);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>Japanese Reading Stats - Books</h1>
    <p>Open the generated reading statistics report.</p>
    <nav>
      <a href="books_reading_report.html">Reading report</a>
    </nav>
  </main>
</body>
</html>
